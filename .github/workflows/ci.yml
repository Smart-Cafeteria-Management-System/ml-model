# ============================================================
# Smart Cafeteria ML Model — CI/CD Pipeline
# Triggers on push and pull requests to main branch
# Steps: Checkout → Setup Python → Install Deps → Lint → Docker
# ============================================================

name: ML Model CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Install & Verify
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout source code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # 4. Check for syntax errors with py_compile
      - name: Syntax check
        run: python -m py_compile api/predict_api.py

      # 5. Verify imports work
      - name: Verify imports
        run: |
          python -c "import flask; print(f'Flask {flask.__version__}')"
          python -c "import numpy; print(f'NumPy {numpy.__version__}')"
          python -c "import pandas; print(f'Pandas {pandas.__version__}')"
          python -c "import sklearn; print(f'Scikit-learn {sklearn.__version__}')"

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t smart-cafeteria-ml .
